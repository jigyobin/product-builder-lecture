<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle">
        <button id="toggle-sound">🔈 Sound On</button>
        <button id="toggle-theme">Dark Mode</button>
    </div>
    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        <!-- Alternative royalty-free ambient source if needed -->
    </audio>
    <div class="container">
        <h1>Lotto Number Generator</h1>
        <div class="numbers"></div>
        <button id="generate">Generate Numbers</button>
    </div>

    <div class="form-container">
        <h2>제휴 문의</h2>
        <form action="https://formspree.io/f/xkoevwgg" method="POST">
            <div class="form-group">
                <label for="name">이름</label>
                <input type="text" id="name" name="name" required placeholder="성함을 입력해주세요">
            </div>
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" required placeholder="제휴 관련 문의 내용을 입력해주세요"></textarea>
            </div>
            <button type="submit" class="submit-btn">제출하기</button>
        </form>
    </div>

    <script src="main.js"></script>
</body>
</html>
