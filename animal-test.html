<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인공지능 동물상 테스트</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container main-container">
        <header>
            <h1 class="title">인공지능 동물상 테스트</h1>
            <p class="subtitle">나는 어떤 동물을 닮았을까? AI가 알려주는 나의 동물상!</p>
        </header>

        <section class="upload-section">
            <div id="image-upload-container" class="image-upload-wrap">
                <input class="file-upload-input" type="file" onchange="readURL(this);" accept="image/*" />
                <div class="drag-text">
                    <i class="fas fa-cloud-upload-alt upload-icon"></i>
                    <h3>얼굴 사진을 올리거나 눌러서 업로드하세요!</h3>
                </div>
            </div>
            <div class="file-upload-content">
                <img class="file-upload-image" id="face-image" src="#" alt="your image" />
                <div id="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>AI가 당신의 관상을 분석중입니다...</p>
                </div>
                <p class="result-message"></p>
                <div id="label-container"></div>
                <div class="image-title-wrap">
                    <button type="button" onclick="window.location.reload()" class="remove-image">
                        다른 사진으로 재시도
                    </button>
                </div>
            </div>
        </section>

        <footer>
            <p>© 2024 AI Animal Face Test. All Rights Reserved.</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
