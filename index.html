<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jigyobin's AI Services</title>
    <link rel="stylesheet" href="style.css">
    <!-- Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    <!-- Channel.io Plugin -->
    <script>
        (function() {
            var w = window;
            if (w.ChannelIO) {
                return (window.console.error || window.console.log || function(){})('ChannelIO script included twice.');
            }
            var ch = function() {
                ch.c(arguments);
            };
            ch.q = [];
            ch.c = function(args) {
                ch.q.push(args);
            };
            w.ChannelIO = ch;
            function l() {
                if (w.ChannelIOInitialized) {
                    return;
                }
                w.ChannelIOInitialized = true;
                var s = document.createElement('script');
                s.type = 'text/javascript';
                s.async = true;
                s.src = 'https://cdn.channel.io/plugin/ch-plugin-web.js';
                s.charset = 'UTF-8';
                var x = document.getElementsByTagName('script')[0];
                x.parentNode.insertBefore(s, x);
            }
            if (document.readyState === 'complete') {
                l();
            } else if (window.attachEvent) {
                window.attachEvent('onload', l);
            } else {
                window.addEventListener('DOMContentLoaded', l, false);
                window.addEventListener('load', l, false);
            }
        })();
        ChannelIO('boot', {
            "pluginKey": "c421f67e-6569-45b9-8334-36a5368a855a"
        });
    </script>
</head>
<body>
    <h1>Jigyobin's AI Services</h1>

    <div class="container">
        <h2>Lotto Number Generator</h2>
        <div class="numbers"></div>
        <button id="generate">Generate Numbers</button>
    </div>

    <div class="container">
        <h2>Cat & Dog Classifier</h2>
        <p>Is it a cat or a dog? Let the AI tell you!</p>
        <button id="start-model">Start Camera</button>
        <div id="webcam-canvas"></div>
        <div id="label-container"></div>
    </div>
    
    <script src="main.js"></script>
</body>
</html>
